# Red Hat OpenShift Service Mesh 3 operator (Sail-based).
# Installed into openshift-operators (cluster-wide operator namespace).
#
# Pinned to a specific CSV with Manual approval, matching the foundation's
# reproducibility rule: the catalog already carries a newer CSV (v3.2.0), so
# Automatic approval would silently jump versions. Manual + startingCSV keeps
# the control-plane version deterministic across any cluster.
#
# To bump: change startingCSV, let Argo sync, then approve the InstallPlan:
#   oc -n openshift-operators patch installplan <name> --type merge -p '{"spec":{"approved":true}}'
#
# Wave 0: the operator (and its CRDs) must exist before any Istio/IstioCNI CR.
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: servicemeshoperator3
  namespace: openshift-operators
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  channel: stable
  installPlanApproval: Manual
  name: servicemeshoperator3
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  startingCSV: servicemeshoperator3.v3.1.0
