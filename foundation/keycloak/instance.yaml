# Keycloak instance (RHBK 26, v2beta1) — wave 1.
# Ephemeral by design: no persistent DB. The realm/client/users are declarative
# (see realm.yaml.tpl), so the meaningful state is reconciled from Git on every
# boot. A restart loses only manual-console state and sessions — which we don't keep.
#
# v2beta1 schema confirmed against the installed CRD (RHBK 26.6.3).
apiVersion: k8s.keycloak.org/v2beta1
kind: Keycloak
metadata:
  name: showcase
  namespace: showcase-keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  instances: 1

  # --- Database: ephemeral (no Postgres, no PVC) ----------------------------
  # In v2beta1 there is no `db.vendor: dev-file`. The dev-mode file store is set
  # via a server option through additionalOptions. This keeps the instance
  # ephemeral; to make it persistent later, replace this with a `db:` block
  # (vendor: postgres + host/url + credential secrets).
  additionalOptions:
    - name: db
      value: dev-file
    # Trust the edge proxy (TLS terminates at the OpenShift Route).
    - name: proxy-headers
      value: xforwarded

  # --- HTTP: serve plain HTTP; TLS terminates at the OpenShift edge Route ----
  http:
    httpEnabled: true

  # --- Hostname: derived from the cluster, not hardcoded --------------------
  # strict: false lets Keycloak resolve the hostname from request headers, so we
  # don't pin a cluster-specific host here (portable). The actual host is the
  # Route the operator creates; record it in ENVIRONMENT.local §4 after install.
  hostname:
    strict: false

  # --- Expose via the operator-managed ingress (OpenShift Route) ------------
  ingress:
    enabled: true
