# Red Hat build of Keycloak (RHBK) operator — wave 0.
# Pinned for idempotency (mirrors scripts/foundation-versions.env):
#   KEYCLOAK_CHANNEL=stable-v26.6
#   KEYCLOAK_CSV=rhbk-operator.v26.6.3-opr.1
#
# Unlike the GitOps operator, this one is namespace-scoped to the Keycloak
# namespace, so it needs its own OperatorGroup (created alongside).
# sync-wave 0: operator + group install before any Keycloak CR.
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: rhbk-operator-group
  namespace: showcase-keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  targetNamespaces:
    - showcase-keycloak
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: rhbk-operator
  namespace: showcase-keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  channel: stable-v26.6
  installPlanApproval: Manual          # pinned: no silent upgrades
  name: rhbk-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  startingCSV: rhbk-operator.v26.6.3-opr.1
